# QuantTradingSystem — Pre-commit Hooks
# =======================================
# 安装: pre-commit install
# 手动运行: pre-commit run --all-files
# 自动更新: pre-commit autoupdate
#
# 要求: Python >= 3.12, pre-commit >= 4.0 (已在 pyproject.toml dev 依赖中)

repos:
  # ─── Ruff: Lint + Format ──────────────────────────────────────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.5
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        types_or: [python, pyi, jupyter]
        exclude: ^(scripts/|k8s/|helm/)
      - id: ruff-format
        types_or: [python, pyi, jupyter]
        exclude: ^(scripts/|k8s/)

  # ─── 基础文件清理 ──────────────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
        exclude: ^(k8s/|helm/)
      - id: end-of-file-fixer
        exclude: ^(k8s/|helm/)
      - id: check-yaml
        args: [--allow-multiple-documents]
        exclude: ^(k8s/|helm/)
      - id: check-added-large-files
        args: [--maxkb=1024]
      - id: check-merge-conflict
      - id: detect-private-key
        exclude: (\.env\.example|\.env\.template|config\.example\.py)

  # ─── 发布前脱敏检查（本地脚本，仅拦推 GitHub，硬拦高危）─────────────────
  - repo: local
    hooks:
      - id: prepublish-desensitize
        name: 脱敏检查 (desensitize · pre-push)
        entry: bash $HOME/.workbuddy/skills/prepublish-desensitize/scripts/pre-push-hook.sh
        language: system
        pass_filenames: false
        always_run: true
        stages: [push]
