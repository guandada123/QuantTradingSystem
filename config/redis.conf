# ============================================================
# QuantTradingSystem Redis Configuration
# 持久化 + 内存管理 + 安全
# ============================================================

# ---- 网络 ----
bind 0.0.0.0
port 6379
protected-mode no
timeout 300
tcp-keepalive 60

# ---- 内存管理 ----
maxmemory 512mb
maxmemory-policy allkeys-lru
maxmemory-samples 10

# ---- RDB 持久化 ----
# 每60秒至少1次变更触发快照
save 900 1
save 300 10
save 60 1000
stop-writes-on-bgsave-error yes
rdbcompression yes
rdbchecksum yes
dbfilename dump.rdb
dir /data

# ---- AOF 持久化 (追加日志，更安全) ----
appendonly yes
appendfilename "appendonly.aof"
# everysec: 每秒fsync — 性能与安全的平衡点
appendfsync everysec
no-appendfsync-on-rewrite no
# 自动重写：AOF增长100%时触发
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb
aof-load-truncated yes
aof-use-rdb-preamble yes

# ---- 慢日志 ----
slowlog-log-slower-than 10000
slowlog-max-len 128

# ---- 客户端 ----
maxclients 1000

# ---- Lua ----
lua-time-limit 5000

# ---- 延迟监控 ----
latency-monitor-threshold 100
