# QuantTradingSystem Nginx配置
# 用途：反向代理 + 前端静态文件托管
# 生产环境使用

worker_processes 2;
events {
    worker_connections 1024;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # 日志格式（JSON便于ELK解析）
    log_format json_analytics escape=json
        '{'
        '"time_local":"$time_local",'
        '"remote_addr":"$remote_addr",'
        '"request":"$request",'
        '"status":$status,'
        '"body_bytes_sent":$body_bytes_sent,'
        '"request_time":$request_time,'
        '"request_id":"$http_x_request_id",'
        '"http_referer":"$http_referer",'
        '"http_user_agent":"$http_user_agent",'
        '"upstream_addr":"$upstream_addr",'
        '"upstream_status":"$upstream_status"'
        '}';

    access_log /var/log/nginx/access.log json_analytics;
    error_log  /var/log/nginx/error.log warn;

    sendfile       on;
    tcp_nopush     on;
    tcp_nodelay    on;
    keepalive_timeout 65;
    keepalive_requests 1000;

    # Gzip压缩
    gzip on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml+rss text/javascript;
    gzip_vary on;
    gzip_proxied any;

    # 安全头 (applied via server block due to nginx add_header inheritance)

    upstream backend {
        server strategy-service:8000 max_fails=3 fail_timeout=10s;
        keepalive 32;
    }

    server {
        listen 80;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        # ============================================
        # 安全头部（应用于所有非覆盖的 location）
        # ============================================
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;

        # ============================================
        # API反向代理
        # ============================================
        location /api/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # 链路追踪：透传或生成 Request ID
            proxy_set_header X-Request-ID $request_id;
            proxy_connect_timeout 10s;
            proxy_read_timeout 30s;
            proxy_send_timeout 10s;
            
            # 缓存API响应
            proxy_cache off;
        }

        # ============================================
        # WebSocket代理
        # ============================================
        location /ws {
            proxy_pass http://backend/ws;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # ============================================
        # 静态文件
        # ============================================
        location / {
            # 尝试：直接文件 → 目录索引 → index.html（SPA支持）
            try_files $uri $uri/ /index.html;
            
            # 静态文件缓存
            location ~* \.(html|htm)$ {
                expires 5m;
                add_header Cache-Control "public, max-age=300";
                add_header X-Content-Type-Options "nosniff" always;
                add_header X-Frame-Options "SAMEORIGIN" always;
                add_header X-XSS-Protection "1; mode=block" always;
            }
            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
                expires 7d;
                add_header Cache-Control "public, immutable, max-age=604800";
                add_header X-Content-Type-Options "nosniff" always;
            }
        }

        # ============================================
        # 监控端点（限制内网访问）
        # ============================================
        location /health {
            proxy_pass http://backend/health;
            allow 127.0.0.1;
            allow 172.16.0.0/12;
            deny all;
        }

        location /metrics {
            proxy_pass http://backend/metrics;
            allow 127.0.0.1;
            allow 172.16.0.0/12;
            deny all;
        }

        # ============================================
        # 错误页面
        # ============================================
        error_page 404 /404.html;
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }
}
