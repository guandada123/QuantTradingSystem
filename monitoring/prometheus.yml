global:
  scrape_interval: 15s
  evaluation_interval: 15s

# Alertmanager 配置
alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager-feishu:9093']

# 告警规则文件
rule_files:
  - '/etc/prometheus/alert_rules.yml'
  - '/etc/prometheus/slo_rules.yml'

scrape_configs:
  - job_name: 'strategy-service'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['strategy-service:8000']
        labels:
          service: 'strategy'

  - job_name: 'execution-service'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['execution-service:8001']
        labels:
          service: 'execution'

  - job_name: 'ai-scheduler'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['ai-scheduler:8002']
        labels:
          service: 'ai-scheduler'

  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres:5432']
        labels:
          service: 'database'

  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']
        labels:
          service: 'cache'

  - job_name: 'questdb'
    static_configs:
      - targets: ['questdb:9000']
        labels:
          service: 'timeseries'

  - job_name: 'rabbitmq'
    static_configs:
      - targets: ['rabbitmq:15672']
        labels:
          service: 'message-queue'
