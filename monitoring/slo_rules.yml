# ============================================================
# QuantTradingSystem SLO (Service Level Objectives)
# Prometheus Recording Rules
# 定义核心服务等级目标，用于计算错误预算消耗
# ============================================================

groups:
  - name: slo_recording_rules
    interval: 30s
    rules:
      # ----- 可用性 SLO -----
      # 目标: API 可用性 >= 99.5%
      - record: slo:availability:good
        expr: |
          sum(rate(http_requests_total{status=~"2..|3.."}[5m])) by (job)
      - record: slo:availability:total
        expr: |
          sum(rate(http_requests_total[5m])) by (job)
      - record: slo:availability:ratio
        expr: |
          sum(rate(http_requests_total{status=~"2..|3.."}[5m])) by (job)
          /
          sum(rate(http_requests_total[5m])) by (job)

      # ----- 延迟 SLO -----
      # 目标: P95 延迟 < 500ms
      - record: slo:latency:p95_seconds
        expr: |
          histogram_quantile(0.95,
            sum(rate(http_request_duration_seconds_bucket[5m])) by (le, job)
          )
      - record: slo:latency:good
        expr: |
          sum(rate(http_request_duration_seconds_bucket{le="0.5"}[5m])) by (job)
      - record: slo:latency:total
        expr: |
          sum(rate(http_request_duration_seconds_count[5m])) by (job)
      - record: slo:latency:ratio
        expr: |
          sum(rate(http_request_duration_seconds_bucket{le="0.5"}[5m])) by (job)
          /
          sum(rate(http_request_duration_seconds_count[5m])) by (job)

      # ----- 错误预算消耗率 -----
      # 可用性错误预算消耗 (每月)
      - record: slo:error_budget:availability_consumed
        expr: |
          (1 - (
            sum(rate(http_requests_total{status=~"2..|3.."}[30d])) by (job)
            /
            sum(rate(http_requests_total[30d])) by (job)
          )) / (1 - 0.995)

  - name: slo_alerts
    interval: 1m
    rules:
      # ----- 错误预算快耗尽 -----
      - alert: ErrorBudgetBurning
        expr: |
          (1 - (
            sum(rate(http_requests_total{status=~"2..|3.."}[1h])) by (job)
            /
            sum(rate(http_requests_total[1h])) by (job)
          )) / (1 - 0.995) > 0.01
        for: 5m
        labels:
          severity: warning
          category: slo
        annotations:
          summary: "{{ $labels.job }} 错误预算正在快速消耗"
          description: "错误预算消耗速率 > 1%/小时，当前可用性: {{ $value | humanize }}"

      # ----- SLO 违规 -----
      - alert: SLOViolation
        expr: |
          sum(rate(http_requests_total{status=~"2..|3.."}[30d])) by (job)
          /
          sum(rate(http_requests_total[30d])) by (job) < 0.995
        for: 10m
        labels:
          severity: critical
          category: slo
        annotations:
          summary: "{{ $labels.job }} 违反可用性 SLO (99.5%)"
          description: "30天可用性 = {{ $value | humanizePercentage }}，低于 99.5% 目标"

      # ----- 交易服务延迟 SLO -----
      - alert: LatencySLOViolation
        expr: |
          histogram_quantile(0.95,
            sum(rate(http_request_duration_seconds_bucket{job=~"strategy-service|execution-service"}[1h])) by (le, job)
          ) > 0.5
        for: 10m
        labels:
          severity: warning
          category: slo
        annotations:
          summary: "{{ $labels.job }} P95 延迟超过 500ms SLO"
          description: "{{ $labels.job }} P95 延迟 = {{ $value }}s，阈值 0.5s"
