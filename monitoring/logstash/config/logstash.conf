# Logstash 管道配置 — QuantTradingSystem ELK日志管道 v2
# 增强：提取 request_id 为 ES 顶层字段 + 服务名称解析
input {
  # 接收来自Filebeat的日志
  beats {
    port => 5044
  }

  # 直接TCP输入（备选）
  tcp {
    port => 5000
    codec => json_lines
    type => "quant-logs"
  }
}

filter {
  # === 处理 JSON 格式日志（TCP json_lines 输入 ===
  if [type] == "quant-logs" {
    json {
      source => "message"
      skip_on_invalid_json => true
    }

    # 从已解析的 JSON 中提取 request_id（如果有）
    if [request_id] and [request_id] != "-" {
      mutate {
        add_field => { "trace_id" => "%{[request_id]}" }
        add_tag => ["has_trace"]
      }
    }

    # 提取服务名
    mutate {
      add_field => {
        "[@metadata][service]" => "%{[service]}"
      }
    }

    # 标记错误日志
    if [level] == "ERROR" or [level] == "CRITICAL" {
      mutate {
        add_tag => ["error"]
      }
    }
  }

  # === 处理文本日志（beats 输入，Python 标准格式）===
  # Python 日志格式：
  #   %(asctime)s - %(name)s - %(levelname)s - [%(request_id)s] - %(message)s
  # 示例：
  #   2026-06-10 22:30:00,123 - uvicorn - INFO - [abc-def-123] - Started server
  else {
    grok {
      match => {
        "message" => [
          "%{TIMESTAMP_ISO8601:timestamp} - %{DATA:logger_name} - %{LOGLEVEL:level} - \[%{DATA:request_id}\] - %{GREEDYDATA:log_message}",
          "%{TIMESTAMP_ISO8601:timestamp} - %{DATA:logger_name} - %{LOGLEVEL:level} - %{GREEDYDATA:log_message}",
          "%{GREEDYDATA:log_message}"
        ]
      }
      break_on_match => true
      tag_on_failure => ["_grok_failed"]
    }

    # 提取 request_id 为 ES 顶层 trace_id 字段
    if [request_id] and [request_id] != "-" and [request_id] != "" {
      mutate {
        add_field => { "trace_id" => "%{[request_id]}" }
        add_tag => ["has_trace"]
        remove_field => ["message"]  # 原始消息已拆解到 log_message
      }
    }

    # 标记错误日志
    if [level] == "ERROR" or [level] == "CRITICAL" {
      mutate { add_tag => ["error"] }
    }
  }
}

output {
  # 输出到Elasticsearch
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "quant-logs-%{+YYYY.MM.dd}"

    # 模板控制：确保 trace_id 作为 keyword 类型被索引
    template_overwrite => true
    template_name => "quant-logs-template"
    template => "/usr/share/logstash/templates/quant-logs-template.json"
  }

  # 控制台输出（调试用）
  stdout {
    codec => rubydebug
  }
}
