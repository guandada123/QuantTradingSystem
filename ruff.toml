# Ruff configuration — QuantTradingSystem
# Enforces consistent Python code style across the team.
# Run: ruff check . && ruff format --check .

target-version = "py311"
line-length = 100
indent-width = 4

[lint]
select = [
    # pycodestyle
    "E", "W",
    # pyflakes
    "F",
    # isort
    "I",
    # pep8-naming
    "N",
    # pyupgrade
    "UP",
    # flake8-bugbear
    "B",
    # flake8-comprehensions
    "C4",
    # flake8-simplify
    "SIM",
    # flake8-type-checking
    "TCH",
    # flake8-return
    "RET",
    # flake8-bandit (security)
    "S",
    # flake8-print
    "T20",
    # flake8-errmsg
    "EM",
    # pylint
    "PL",
    # tryceratops
    "TRY",
    # flake8-raise
    "RSE",
    # flake8-boolean-trap
    "FBT",
    # flake8-unused-arguments
    "ARG",
    # flake8-datetimez
    "DTZ",
    # flake8-annotations
    "ANN",
    # flake8-pie
    "PIE",
    # flake8-no-pep420
    "INP",
]

ignore = [
    "E501",            # line too long — handled by formatter
    "D100", "D104",    # missing module/package docstring
    # 类型注解（渐进式添加，暂不强制全部）
    "ANN001", "ANN002", "ANN003", "ANN201", "ANN202", "ANN204", "ANN401",
    # 重构类（需大规模改动）
    "ARG001", "ARG002",
    "PLC0415",         # import-outside-top-level
    "PLR0912", "PLR0913", "PLR0915", "PLR0911",
    "PLR2004",         # magic-value-comparison
    "PLW1510", "PLW0108", "PLW0603", "PLW2901",
    # 风格/低优先级
    "EM101", "EM102",
    "TRY003", "TRY300", "TRY400",
    "FBT001", "FBT002",
    "N806", "N818",
    "B007", "B008", "B904", "B905",
    "F841",
    "DTZ005",          # datetime.now() without tz (渐进修复)
    "RET504", "RET505",
    "SIM102", "SIM103", "SIM105", "SIM108", "SIM110", "SIM116", "SIM118",
    "S110", "S301", "S311", "S603", "S607", "S608",
    "E402", "E722", "E741",
    "INP001",          # implicit-namespace-package
    "PIE810",
    "C401", "C416",
    "TCH001", "TCH002", "TCH003",
    "RSE102",
    "TRY301",
    "F401",            # unused-import (re-exports, conditional)
    "F821",            # undefined-name (conditional imports)
    "DTZ011",          # call-date-today
    "UP042",           # replace-str-enum
    "FBT003",          # boolean-positional-value-in-call
    "S104",            # hardcoded-bind-all-interfaces
    "S105",            # hardcoded-password-string (config defaults)
    "E712",            # true-false-comparison
    "RET503",          # implicit-return
    "DTZ007",          # call-datetime-strptime-without-zone
    "DTZ001",          # call-datetime-without-tzinfo
    "SIM117",          # multiple-with-statements
    "B025",            # duplicate-try-block-exception
    "S106",            # hardcoded-password-func-arg
    "S310",            # suspicious-url-open-usage
    "TRY002",          # raise-vanilla-class
    "ANN206",          # missing-return-type-class-method
    "C408",            # unnecessary-collection-call
    "PLR1714",         # repeated-equality-comparison
]

[lint.per-file-ignores]
"tests/**/*.py" = ["S101", "ARG", "FBT", "ANN", "T201"]
"**/tests/**/*.py" = ["S101", "ARG", "FBT", "ANN", "T201"]
"scripts/**/*.py" = ["ANN", "S101", "T201", "S310"]
"k8s/**/*.py" = ["ANN", "S404"]
"shared/**/*.py" = ["T201"]
"strategy-service/**/*.py" = ["T201"]
"execution-service/**/*.py" = ["T201"]
"ai-scheduler/**/*.py" = ["T201"]

[lint.isort]
known-first-party = [
    "strategy_service",
    "execution_service",
    "ai_scheduler",
    "shared",
]
force-sort-within-sections = true

[lint.pylint]
max-args = 6

[format]
quote-style = "double"
indent-style = "space"
docstring-code-format = true
