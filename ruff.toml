target-version = "py311"
line-length = 100

[lint]
select = [
    "E", "W", "F", "B", "S", "SIM",
    "I", "N", "UP", "C4", "T20", "EM",
    "PL", "TRY", "ARG", "PIE",
]

# 抑制规则分类说明：
# PLR2004 — 金融阈值（2/5/20/60/200等）不可避免
# S101    — assert 全在测试文件中
# T201    — CLI工具中print输出
# E402    — 延迟导入/条件导入的合理模式（模块级sys.path操作）
# PLW0603 — 模块级缓存单例
# S310    — HTTPS URL误报（无file://）
# S108/S306 — 测试文件tempfile受控路径
# S603/S607 — subprocess合法使用（无shell=True）
# SIM*    — 风格偏好/可读性优先
# ARG*    — callback占位参数
# UP035   — typing模块兼容性保留
# N802/N803/N817/N818 — 合理命名惯例例外
# PLC*/PLW* — 语义清晰的代码模式
# E741    — 有限作用域的单字母变量
# C4/C416 — 语义等价的写法偏好
# F401    — 类型检查/条件导入
ignore = [
    # 代码长度
    "E501",
    # 未使用参数（回调/接口实现）
    "ARG001", "ARG002",
    # 重构类（需大规模改动）
    "PLC0415",
    "PLR0912", "PLR0913", "PLR0915",
    "PLW1510", "PLW0108",
    # 异常处理风格
    "TRY300", "TRY400",
    "EM101", "EM102",
    # 命名惯例
    "N806",
    # flake8-bugbear 低价值
    "B007", "B905",
    # subprocess 安全（已确认无 shell=True）
    "S603", "S607",
    # 暂时抑制
    "F841",
    "PLR0911",
    "TRY003",
]

[lint.per-file-ignores]
# CLI/脚本目录（print/导入顺序/长度等合理豁免）
"scripts/*.py" = ["T201", "PLR2004", "E402", "F401", "E741", "F823", "PLW2901", "PLW0603", "SIM117", "SIM105", "S310", "S108", "S306", "S602", "S324", "S608", "S311", "N802", "SIM103", "PLR1714", "SIM101"]
".workbuddy/scripts/*.py" = ["T201", "PLR2004", "E402", "F401", "E741", "F823", "N802", "SIM103", "SIM105", "PLR1714", "SIM101", "S310", "S108", "S112", "S110", "S306", "S602", "S324", "S311"]
"archive/scripts/*.py" = ["T201", "PLR2004", "E402", "F401", "E741", "F823", "PLW2901", "PLW0603", "SIM117", "SIM105", "S310", "S108", "S306", "S602", "S324", "S608", "S311"]
# 测试目录
".workbuddy/tests/**" = ["S101", "PLR2004", "ARG005", "E722", "E402"]
"scripts/test_*.py" = ["S101", "PLR2004", "ARG005", "E722"]
# 库文件
".workbuddy/lib/*.py" = ["PLR2004", "F401", "E741", "F823"]
# __init__
"__init__.py" = ["F401"]
