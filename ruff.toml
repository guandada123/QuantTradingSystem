target-version = "py311"
line-length = 100

[lint]
select = [
    "E", "W", "F", "B", "S", "SIM",
    "I", "N", "UP", "C4", "T20", "EM",
    "PL", "TRY", "ARG", "PIE",
]

ignore = [
    # 代码长度
    "E501",
    # 未使用参数（回调/接口实现）
    "ARG001", "ARG002",
    # 重构类（需大规模改动）
    "PLC0415",
    "PLR0912", "PLR0913", "PLR0915",
    "PLW1510", "PLW0108",
    # 异常处理风格
    "TRY300", "TRY400",
    "EM101", "EM102",
    # 命名惯例
    "N806",
    # flake8-bugbear 低价值
    "B007", "B905",
    # subprocess 安全
    "S603", "S607",
    # 暂时抑制
    "F841", "PLR0911", "TRY003",
    # === 项目合理模式（非故障，风格选择） ===
    "T201",     # CLI/debug print 输出
    "PLR2004",  # 金融阈值（2/5/20/60/200等不可避免）
    "E402",     # 延迟导入（模块级sys.path操作）
    "S106",     # 安全函数调用（参数来源已知）
    "S113",     # httpx timeout=None（API长连接合理）
    "TRY301",   # raise inside try（重抛模式）
    "B904",     # raise without from（Python 3.11+ 自动追踪）
    "B008",     # mutable default 参数（合理使用）
    "SIM117",   # 嵌套 with 语句（可读性优先）
    "PLW0603",  # global 变量（单例/缓存模式）
    "E731",     # lambda 赋值（便捷写法）
    "SIM105",   # contextlib vs 显式 try
    "S110",     # except pass（异常吞没但合理）
    "SIM102",   # 嵌套 if 合并（逐层检查更清晰）
    "S310",     # URL 打开（均走 HTTPS）
    "UP042",    # typing 兼容性
    # === 脚本/config 文件中的合理模式 ===
    "S104",     # 硬编码 host（localhost配置，非风险）
    "S105",     # 硬编码密码（K8s Secrets管理）
    "S108",     # tempfile 路径（安全可控）
    "S102",     # ssh/telnet 端口（配置文件中合理）
    "F811",     # 函数重定义（测试marker重注册）
    "PIE810",   # dict key重复（配置合并模式）
    "C401",     # set() 字面量（可读性优先）
    "SIM103",   # 提前返回（嵌套判断更清晰）
    "SIM108",   # 三元表达式（多行if更可读）
    "PLW2901",  # loop 变量重赋值
    "PLR0133",  # constant comparison（双边比较更安全）
]

[lint.per-file-ignores]
# CLI/脚本目录
"scripts/*.py" = ["T201", "PLR2004", "E402", "F401", "E741", "F823", "PLW2901", "PLW0603", "SIM117", "SIM105", "S310", "S108", "S306", "S602", "S324", "S608", "S311", "N802", "SIM103", "PLR1714", "SIM101"]
".workbuddy/scripts/*.py" = ["T201", "PLR2004", "E402", "F401", "E741", "F823", "N802", "SIM103", "SIM105", "PLR1714", "SIM101", "S310", "S108", "S112", "S110", "S306", "S602", "S324", "S311"]
"archive/scripts/*.py" = ["T201", "PLR2004", "E402", "F401", "E741", "F823", "PLW2901", "PLW0603", "SIM117", "SIM105", "S310", "S108", "S306", "S602", "S324", "S608", "S311"]
# 所有测试文件
"**/tests/**/*.py" = ["S101", "PLR2004", "ARG005", "E722", "E402", "T201"]
"**/test_*.py" = ["S101", "PLR2004", "ARG005", "E722", "T201"]
# 库文件
".workbuddy/lib/*.py" = ["PLR2004", "F401", "E741", "F823"]
# __init__
"__init__.py" = ["F401"]
# Specific files with intentional patterns
"data/fetch_data.py" = ["SIM112"]
"execution-service/services/miniqmt_connector.py" = ["F401"]
"qmt/qmt_bridge_server.py" = ["F401"]
"scripts/chaos_test.py" = ["UP035"]
"shared/exceptions.py" = ["N818"]
"strategy-service/core/cache.py" = ["PLW0602"]
"strategy-service/repositories/stock_repo.py" = ["E712"]
"strategy-service/scripts/bt_combo_report.py" = ["E741"]
"strategy-service/tests/test_api.py" = ["PLC0414"]
"strategy-service/tests/test_backtest_repo_integration.py" = ["C408"]
"strategy-service/tests/test_data_service.py" = ["TRY002"]

"strategy-service/shared/auth.py" = ["S101"]
"strategy-service/shared/rate_limiter.py" = ["S101"]
