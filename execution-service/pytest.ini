[pytest]
# execution-service 测试配置
testpaths = tests
pythonpath = .
asyncio_mode = auto
addopts = -v --tb=short --strict-markers

markers =
    slow: 慢速测试（依赖外部服务）
    integration: 集成测试（依赖外部服务）

# 覆盖率配置
[coverage:run]
source = .
omit =
    tests/*
    */__pycache__/*
    */__init__.py

[coverage:report]
fail_under = 50
