{{/* Secret — 敏感配置 (部署时通过 --set secrets.xxx= 或外部密钥管理注入) */}}
apiVersion: v1
kind: Secret
metadata:
  name: quant-secrets
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "quant-trading.labels" . | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_USER: {{ .Values.postgres.auth.user | quote }}
  POSTGRES_PASSWORD: {{ .Values.postgres.auth.password | quote }}
  POSTGRES_DB: {{ .Values.postgres.auth.database | quote }}
  DATABASE_URL: {{ .Values.secrets.postgresUrl | default (printf "postgresql://%s:%s@postgres.%s.svc.cluster.local:5432/%s" .Values.postgres.auth.user .Values.postgres.auth.password .Values.global.namespace .Values.postgres.auth.database) | quote }}
  REDIS_URL: {{ .Values.secrets.redisUrl | default (printf "redis://redis.%s.svc.cluster.local:6379/0" .Values.global.namespace) | quote }}
  QUESTDB_URL: {{ printf "http://questdb.%s.svc.cluster.local:8812" .Values.global.namespace | quote }}
  RABBITMQ_DEFAULT_USER: {{ .Values.rabbitmq.auth.user | quote }}
  RABBITMQ_DEFAULT_PASS: {{ .Values.rabbitmq.auth.password | quote }}
  RABBITMQ_URL: {{ .Values.secrets.rabbitmqUrl | default (printf "amqp://%s:%s@rabbitmq.%s.svc.cluster.local:5672" .Values.rabbitmq.auth.user .Values.rabbitmq.auth.password .Values.global.namespace) | quote }}

  # 外部 API — 部署时注入真实值
  TUSHARE_TOKEN: {{ .Values.secrets.tushareToken | quote }}
  AKSHARE_TOKEN: {{ .Values.secrets.akshareToken | quote }}
  DEEPSEEK_API_KEY: {{ .Values.secrets.deepseekApiKey | quote }}
  KIMI_API_KEY: {{ .Values.secrets.kimiApiKey | quote }}
  GLM_API_KEY: {{ .Values.secrets.glmApiKey | quote }}
  MINIMAX_API_KEY: {{ .Values.secrets.minimaxApiKey | quote }}

  # MiniQMT
  MINIQMT_USER: {{ .Values.secrets.miniqmtUser | quote }}
  MINIQMT_PASSWORD: {{ .Values.secrets.miniqmtPassword | quote }}

  # 飞书告警
  FEISHU_WEBHOOK: {{ .Values.secrets.feishuWebhook | quote }}
  FEISHU_ALERT_WEBHOOK: {{ .Values.secrets.feishuWebhook | quote }}

  # Grafana
  GF_SECURITY_ADMIN_PASSWORD: {{ .Values.secrets.grafanaAdminPassword | quote }}
