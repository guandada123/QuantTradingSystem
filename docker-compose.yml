version: '3.8'

services:
  # 策略研究服务
  strategy-service:
    build:
      context: ./strategy-service
      dockerfile: Dockerfile
    container_name: quant-strategy
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://quant_user:quant_pass@postgres:5432/quant_trading
      - REDIS_URL=redis://redis:6379/0
      - QUESTDB_URL=http://questdb:8812
      - RABBITMQ_URL=amqp://rabbitmq:5672
      - AKSHARE_TOKEN=${AKSHARE_TOKEN}
      - TUSHARE_TOKEN=${TUSHARE_TOKEN}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      questdb:
        condition: service_started
      rabbitmq:
        condition: service_started
    volumes:
      - ./strategy-service:/app
      - ./data:/app/data
    networks:
      - quant-network
    restart: unless-stopped

  # 交易执行服务
  execution-service:
    build:
      context: ./execution-service
      dockerfile: Dockerfile
    container_name: quant-execution
    ports:
      - "8001:8001"
    environment:
      - DATABASE_URL=postgresql://quant_user:quant_pass@postgres:5432/quant_trading
      - RABBITMQ_URL=amqp://rabbitmq:5672
      - MINIQMT_USER=${MINIQMT_USER}
      - MINIQMT_PASSWORD=${MINIQMT_PASSWORD}
      - FEISHU_WEBHOOK=${FEISHU_WEBHOOK}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_started
    volumes:
      - ./execution-service:/app
      - ./data:/app/data
    networks:
      - quant-network
    restart: unless-stopped

  # Web前端（Nginx反向代理 + 静态文件）
  dashboard:
    image: nginx:alpine
    container_name: quant-dashboard
    ports:
      - "3000:80"
    volumes:
      - ./dashboard:/usr/share/nginx/html:ro
      - ./monitoring/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - strategy-service
    networks:
      - quant-network
    restart: unless-stopped

  # PostgreSQL + TimescaleDB数据库
  postgres:
    image: timescale/timescaledb:latest-pg15
    container_name: quant-postgres
    environment:
      - POSTGRES_USER=quant_user
      - POSTGRES_PASSWORD=quant_pass
      - POSTGRES_DB=quant_trading
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docs/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quant_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - quant-network
    restart: unless-stopped

  # Redis缓存
  redis:
    image: redis:7-alpine
    container_name: quant-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - quant-network
    restart: unless-stopped

  # QuestDB时序数据库
  questdb:
    image: questdb/questdb:latest
    container_name: quant-questdb
    ports:
      - "8812:8812"
      - "9000:9000"
    volumes:
      - questdb_data:/root/.questdb
    networks:
      - quant-network
    restart: unless-stopped

  # RabbitMQ消息队列
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: quant-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=quant_user
      - RABBITMQ_DEFAULT_PASS=quant_pass
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - quant-network
    restart: unless-stopped

  # Prometheus监控
  prometheus:
    image: prom/prometheus:latest
    container_name: quant-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - quant-network
    restart: unless-stopped

  # Grafana可视化
  grafana:
    image: grafana/grafana:latest
    container_name: quant-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_INSTALL_PLUGINS=grafana-clock-panel
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
    networks:
      - quant-network
    restart: unless-stopped

  # ELK Stack - Elasticsearch
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: quant-elasticsearch
    ports:
      - "9200:9200"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - quant-network
    restart: unless-stopped

  # ELK Stack - Logstash
  logstash:
    image: docker.elastic.co/logstash/logstash:8.11.0
    container_name: quant-logstash
    ports:
      - "5044:5044"
      - "9600:9600"
    volumes:
      - ./monitoring/logstash/config:/usr/share/logstash/pipeline
    depends_on:
      - elasticsearch
    networks:
      - quant-network
    restart: unless-stopped

  # ELK Stack - Kibana
  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.0
    container_name: quant-kibana
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    depends_on:
      - elasticsearch
    networks:
      - quant-network
    restart: unless-stopped

networks:
  quant-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  questdb_data:
  rabbitmq_data:
  prometheus_data:
  grafana_data:
  elasticsearch_data:
