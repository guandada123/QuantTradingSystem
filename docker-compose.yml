version: '3.8'

services:
  # зӯ–з•Ҙз ”з©¶жңҚеҠЎ
  strategy-service:
    build:
      context: ./strategy-service
      dockerfile: Dockerfile
    container_name: quant-strategy
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://quant_user:quant_pass@postgres:5432/quant_trading
      - REDIS_URL=redis://redis:6379/0
      - QUESTDB_URL=http://questdb:8812
      - RABBITMQ_URL=amqp://rabbitmq:5672
      - AKSHARE_TOKEN=${AKSHARE_TOKEN}
      - TUSHARE_TOKEN=${TUSHARE_TOKEN}
      - FEISHU_WEBHOOK=${FEISHU_WEBHOOK}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      questdb:
        condition: service_started
      rabbitmq:
        condition: service_started
    volumes:
      - ./strategy-service:/app
      - ./shared:/app/shared
      - ./data:/app/data
    networks:
      - quant-network
    restart: unless-stopped
    mem_limit: 512m
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # дәӨжҳ“жү§иЎҢжңҚеҠЎ
  execution-service:
    build:
      context: ./execution-service
      dockerfile: Dockerfile
    container_name: quant-execution
    cap_add:
      - NET_ADMIN
    ports:
      - "8001:8001"
    environment:
      - DATABASE_URL=postgresql://quant_user:quant_pass@postgres:5432/quant_trading
      - RABBITMQ_URL=amqp://rabbitmq:5672
      - MINIQMT_USER=${MINIQMT_USER}
      - MINIQMT_PASSWORD=${MINIQMT_PASSWORD}
      - FEISHU_WEBHOOK=${FEISHU_WEBHOOK}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_started
    volumes:
      - ./execution-service:/app
      - ./shared:/app/shared
      - ./data:/app/data
    networks:
      - quant-network
    restart: unless-stopped
    mem_limit: 512m

  # AIи°ғеәҰеҷЁеҫ®жңҚеҠЎ
  ai-scheduler:
    build:
      context: ./ai-scheduler
      dockerfile: Dockerfile
    container_name: quant-ai-scheduler
    ports:
      - "8002:8002"
    environment:
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - DEEPSEEK_BASE_URL=${DEEPSEEK_BASE_URL:-https://api.deepseek.com/v1}
      - STRATEGY_SERVICE_URL=http://strategy-service:8000
      - EXECUTION_SERVICE_URL=http://execution-service:8001
      - FEISHU_WEBHOOK=${FEISHU_WEBHOOK}
    depends_on:
      strategy-service:
        condition: service_started
    volumes:
      - ./ai-scheduler:/app
      - ./shared:/app/shared
    networks:
      - quant-network
    restart: unless-stopped
    mem_limit: 512m

  # WebеүҚз«ҜпјҲNginxеҸҚеҗ‘д»ЈзҗҶ + йқҷжҖҒж–Үд»¶пјү
  dashboard:
    image: nginx:alpine
    container_name: quant-dashboard
    ports:
      - "3000:80"
    volumes:
      - ./dashboard:/usr/share/nginx/html:ro
      - ./monitoring/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - strategy-service
    networks:
      - quant-network
    restart: unless-stopped

  # PostgreSQL + TimescaleDBж•°жҚ®еә“
  postgres:
    image: timescale/timescaledb:latest-pg15
    container_name: quant-postgres
    environment:
      - POSTGRES_USER=quant_user
      - POSTGRES_PASSWORD=quant_pass
      - POSTGRES_DB=quant_trading
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docs/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quant_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - quant-network
    restart: unless-stopped

  # Redisзј“еӯҳ
  redis:
    image: redis:7-alpine
    container_name: quant-redis
    command: redis-server /usr/local/etc/redis/redis.conf
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
      - ./config/redis.conf:/usr/local/etc/redis/redis.conf:ro
    networks:
      - quant-network
    restart: unless-stopped

  # QuestDBж—¶еәҸж•°жҚ®еә“
  questdb:
    image: questdb/questdb:latest
    container_name: quant-questdb
    ports:
      - "8812:8812"
      - "9000:9000"
    volumes:
      - questdb_data:/root/.questdb
    networks:
      - quant-network
    restart: unless-stopped

  # RabbitMQж¶ҲжҒҜйҳҹеҲ—
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: quant-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=quant_user
      - RABBITMQ_DEFAULT_PASS=quant_pass
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - quant-network
    restart: unless-stopped

  # AlertmanagerвҶ’йЈһд№ҰйҖӮй…ҚеҷЁ
  alertmanager-feishu:
    build:
      context: ./monitoring
      dockerfile: Dockerfile.alertmanager-feishu
    container_name: quant-alertmanager-feishu
    ports:
      - "9093:9093"
    environment:
      - FEISHU_ALERT_WEBHOOK=${FEISHU_WEBHOOK}
    networks:
      - quant-network
    restart: unless-stopped

  # Prometheusзӣ‘жҺ§
  prometheus:
    image: prom/prometheus:latest
    container_name: quant-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./monitoring/alert_rules.yml:/etc/prometheus/alert_rules.yml
      - ./monitoring/slo_alerts.yml:/etc/prometheus/slo_alerts.yml
      - ./monitoring/sli_recording_rules.yml:/etc/prometheus/sli_recording_rules.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - quant-network
    restart: unless-stopped

  # GrafanaеҸҜи§ҶеҢ–
  grafana:
    image: grafana/grafana:latest
    container_name: quant-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_INSTALL_PLUGINS=grafana-clock-panel
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources_alt
    networks:
      - quant-network
    restart: unless-stopped

  # ELK Stack - Elasticsearch
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: quant-elasticsearch
    ports:
      - "9200:9200"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - quant-network
    restart: unless-stopped

  # ELK Stack - Logstash
  logstash:
    image: docker.elastic.co/logstash/logstash:8.11.0
    container_name: quant-logstash
    ports:
      - "5044:5044"
      - "9600:9600"
    volumes:
      - ./monitoring/logstash/config:/usr/share/logstash/pipeline
      - ./monitoring/logstash/templates:/usr/share/logstash/templates
    depends_on:
      - elasticsearch
    networks:
      - quant-network
    restart: unless-stopped

  # ELK Stack - Kibana
  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.0
    container_name: quant-kibana
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    depends_on:
      - elasticsearch
    networks:
      - quant-network
    restart: unless-stopped

networks:
  quant-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  questdb_data:
  rabbitmq_data:
  prometheus_data:
  grafana_data:
  elasticsearch_data:
