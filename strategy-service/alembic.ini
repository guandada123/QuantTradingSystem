# Alembic 配置 — QuantTradingSystem strategy-service
# 用法:
#   alembic upgrade head      # 升级到最新
#   alembic downgrade -1      # 回滚一步
#   alembic revision -m "xxx" # 新建迁移
#   alembic stamp head        # 标记当前为最新(已有schema时)
#   alembic check             # CI验证

[alembic]
script_location = alembic
file_template = %%(rev)s_%%(slug)s
prepend_sys_path = .

# 连接字符串从环境变量读取（env.py 中覆盖）
sqlalchemy.url = postgresql://quant_user:quant_pass@localhost:5432/quant_trading

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
