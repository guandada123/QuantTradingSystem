<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>量化交易系统</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif; background: #f0f2f5; color: #333; }

/* 顶栏 */
.topbar { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); color: #fff; padding: 20px 24px; }
.topbar h1 { font-size: 20px; margin-bottom: 14px; }
.index-row { display: flex; flex-wrap: wrap; gap: 12px; }
.index-item { background: rgba(255,255,255,0.08); border-radius: 8px; padding: 10px 16px; min-width: 130px; text-align: center; }
.index-item .name { font-size: 12px; color: rgba(255,255,255,0.55); }
.index-item .price { font-size: 18px; font-weight: 600; margin: 4px 0; }
.index-item .pct { font-size: 13px; font-weight: 500; }
.up { color: #ff4757; }
.down { color: #2ed573; }
.bar { font-size: 12px; color: #999; padding: 10px 24px; background: #fff; border-bottom: 1px solid #eee; }
.bar .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
.dot.green { background: #2ed573; }
.dot.red { background: #ff4757; }

/* 卡片区 */
.main { max-width: 1100px; margin: 24px auto; padding: 0 20px; }
.grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 16px; margin-bottom: 28px; }
.card { background: #fff; border-radius: 12px; padding: 28px 24px; cursor: pointer; border: 1px solid #e8e8e8; transition: all 0.2s; text-decoration: none; display: block; color: #333; }
.card:hover { box-shadow: 0 6px 24px rgba(0,0,0,0.08); transform: translateY(-3px); }
.card .icon { font-size: 32px; margin-bottom: 14px; }
.card h3 { font-size: 17px; margin-bottom: 8px; }
.card p { font-size: 13px; color: #888; line-height: 1.6; }

/* 底部 */
.footer { text-align: center; padding: 24px; color: #aaa; font-size: 12px; }
</style>
</head>
<body>
<div class="topbar">
  <h1>📈 A股量化交易系统</h1>
  <div class="index-row" id="indices">
    <div class="index-item"><div class="name">上证指数</div><div class="price" id="_000001">--</div><div class="pct" id="_000001_pct">--</div></div>
    <div class="index-item"><div class="name">深证成指</div><div class="price" id="_399001">--</div><div class="pct" id="_399001_pct">--</div></div>
    <div class="index-item"><div class="name">创业板指</div><div class="price" id="_399006">--</div><div class="pct" id="_399006_pct">--</div></div>
    <div class="index-item"><div class="name">科创50</div><div class="price" id="_000688">--</div><div class="pct" id="_000688_pct">--</div></div>
    <div class="index-item"><div class="name">沪深300</div><div class="price" id="_000300">--</div><div class="pct" id="_000300_pct">--</div></div>
    <div class="index-item"><div class="name">中证500</div><div class="price" id="_399905">--</div><div class="pct" id="_399905_pct">--</div></div>
  </div>
</div>
<div class="bar">
  <span class="dot" id="statusDot"></span>
  <span id="statusText">加载中...</span>
  <span style="float:right;" id="updateTime"></span>
</div>
<div class="main">
  <div class="grid">
    <a class="card" href="/account.html">
      <div class="icon">📊</div>
      <h3>账户展示</h3>
      <p>查看资产总值、持仓盈亏、每日收益曲线</p>
    </a>
    <a class="card" href="/trade-analysis.html">
      <div class="icon">📋</div>
      <h3>交易分析</h3>
      <p>胜率、盈亏比、最大回撤、夏普比率等核心指标</p>
    </a>
    <a class="card" href="/stock-selection.html">
      <div class="icon">🔍</div>
      <h3>AI选股报告</h3>
      <p>DeepSeek多智能体分析、自动评分、买卖信号</p>
    </a>
    <a class="card" href="/review-analysis.html">
      <div class="icon">🧠</div>
      <h3>每日复盘</h3>
      <p>AI复盘市场走势、策略表现回顾、风险提示</p>
    </a>
  </div>
</div>
<div class="footer">⚠ 仅供学习研究，不构成投资建议。股市有风险，投资需谨慎。</div>

<script>
function formatPct(v) { var n = parseFloat(v); return (n >= 0 ? '+' : '') + n.toFixed(2) + '%'; }
function formatNum(v) { return parseFloat(v).toFixed(2); }
function cls(elId) { return document.getElementById(elId); }

// ========== 获取真实行情数据 ==========
async function loadIndices() {
  var dot = cls('statusDot'), txt = cls('statusText'), time = cls('updateTime');
  try {
    var resp = await fetch('http://localhost:8000/api/v1/stocks/index/realtime');
    var data = await resp.json();
    if (data.success && data.data) {
      data.data.forEach(function(idx) {
        var code = idx.code || idx.ts_code || '';
        if (!code) return;
        var pEl = cls('_' + code);
        var cEl = cls('_' + code + '_pct');
        if (!pEl) return;
        pEl.textContent = formatNum(idx.price);
        if (cEl) {
          cEl.textContent = formatPct(idx.pct_change || 0);
          cEl.className = 'pct ' + (parseFloat(idx.pct_change) >= 0 ? 'up' : 'down');
        }
      });
      dot.className = 'dot green';
      txt.textContent = '交易时段 | 实时数据';
    }
  } catch(e) {
    // 使用静态数据降级
    var fallback = {
      '000001': [4027.74, 0.12], '399001': [10820.50, -0.03], '399006': [2150.80, 0.85],
      '000688': [1050.20, 1.25], '000300': [3954.60, 0.35], '399905': [6230.10, -0.52]
    };
    Object.keys(fallback).forEach(function(k) {
      var pEl = cls('_' + k);
      if (pEl) {
        pEl.textContent = formatNum(fallback[k][0]);
        var cEl = cls('_' + k + '_pct');
        if (cEl) {
          cEl.textContent = formatPct(fallback[k][1]);
          cEl.className = 'pct ' + (fallback[k][1] >= 0 ? 'up' : 'down');
        }
      }
    });
    dot.className = 'dot red';
    txt.textContent = '离线模式 | 使用缓存数据';
  }
  time.textContent = '更新: ' + new Date().toLocaleTimeString();
  setTimeout(loadIndices, 30000); // 每30秒更新
}

loadIndices();
</script>
</body>
</html>
