<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net 'unsafe-inline'; style-src 'self' https://cdn.jsdelivr.net 'unsafe-inline'; connect-src 'self' ws: wss: https://cdn.jsdelivr.net; img-src 'self' data: blob:; font-src 'self' data:;">
<meta name="theme-color" content="#0f0f23">
<meta name="color-scheme content="light dark">
<title>交易下单 - 量化交易系统</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="design-tokens.css">
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/vue@3.3.4/dist/vue.global.prod.js" integrity="sha384-QLgwzsuau/sa8LhRgjRzkvQS0LyUzCM2B8FPwVoSu1KDel940/orifPaumNXp9hK" crossorigin="anonymous"></script>
<style nonce="CSP_NONCE">
/* 交易页面特有 */
.quick-order { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.quick-order .full { grid-column: 1 / -1; }
.toggle-group { display: flex; gap: 0; border: 0.5px solid var(--color-border); border-radius: 6px; overflow: hidden; }
.toggle-group button { flex: 1; padding: 8px; border: none; background: #fff; cursor: pointer; font-size: 13px; transition: background-color 0.2s, color 0.2s, box-shadow 0.2s, border-color 0.2s, transform 0.2s; }
.toggle-group button.active { background: #667eea; color: #fff; }
.pos-actions { display: flex; gap: 4px; }

@media (max-width: 768px) {
  .quick-order { grid-template-columns: 1fr; }
  .quick-order .full { grid-column: 1; }
  .order-layout { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<a href="#main-content" class="skip-link">跳转到主要内容</a>

<div id="app">
  <!-- 顶栏 -->
  <div class="topbar">
    <a href="index.html" class="topbar-brand"><svg viewBox="0 0 20 20" fill="none" aria-hidden="true"><rect x="3" y="2" width="3" height="16" rx="1" fill="#534AB7"/><rect x="9" y="6" width="3" height="12" rx="1" fill="#7F77DD"/><rect x="15" y="10" width="3" height="8" rx="1" fill="#AFA9EC"/></svg>量化交易系统</a>
    <nav aria-label="主导航">
      <a href="index.html">首页</a>
      <a href="account.html">账户</a>
      <a href="orders.html" class="active" aria-current="page">交易</a>
      <a href="trade-analysis.html">分析</a>
      <a href="backtest.html">回测</a>
      <a href="strategies.html">策略</a>
      <a href="stock-selection.html">选股</a>
      <a href="review-analysis.html">复盘</a>
      <a href="alerts.html">告警</a>
    </nav>
        <button class="nav-toggle" aria-label="切换导航菜单" aria-expanded="false"><span></span></button>
        <button class="theme-toggle" aria-label="切换深色/浅色模式" title="切换主题">◐</button>
    <span style="font-size:12px;opacity:0.7">{{ wsStatus }}</span>
  </div>
  <div class="mobile-nav-overlay" aria-hidden="true"></div>

  <main class="container" role="main">
    <!-- 骨架屏 -->
    <div v-if="loading" class="skeleton-container">
      <div class="skeleton-card" style="display:flex;gap:16px;padding:20px">
        <div style="flex:1"><div class="skeleton skeleton-value w80"></div><div class="skeleton skeleton-line w40"></div></div>
        <div style="flex:1"><div class="skeleton skeleton-value w80"></div><div class="skeleton skeleton-line w40"></div></div>
        <div style="flex:1"><div class="skeleton skeleton-value w80"></div><div class="skeleton skeleton-line w40"></div></div>
        <div style="flex:1"><div class="skeleton skeleton-value w80"></div><div class="skeleton skeleton-line w40"></div></div>
      </div>
      <div class="order-layout" style="display:grid;grid-template-columns:360px 1fr;gap:20px">
        <div class="skeleton-card"><div class="skeleton skeleton-title w60"></div><div class="skeleton skeleton-line w100" style="margin-top:16px"></div><div class="skeleton skeleton-line w100"></div><div class="skeleton skeleton-line w100"></div><div class="skeleton skeleton-line w60"></div><div class="skeleton skeleton-line w40"></div></div>
        <div class="skeleton-card"><div class="skeleton skeleton-title w60"></div><div class="skeleton skeleton-table" style="height:180px"></div></div>
      </div>
      <div class="skeleton-card" style="margin-top:20px"><div class="skeleton skeleton-title w60"></div><div class="skeleton skeleton-table" style="height:200px"></div></div>
    </div>

    <template v-if="!loading">
    <!-- 账户摘要 -->
    <div class="card-grid">
      <div class="card-metric"><div class="metric-label">总资产</div><div class="metric-value">{{ formatMoney(summary.total_assets) }}</div></div>
      <div class="card-metric"><div class="metric-label">可用资金</div><div class="metric-value">{{ formatMoney(summary.available_cash) }}</div></div>
      <div class="card-metric"><div class="metric-label">持仓市值</div><div class="metric-value">{{ formatMoney(summary.market_value) }}</div></div>
      <div class="card-metric"><div class="metric-label">今日盈亏</div><div class="metric-value" :class="pnlClass">{{ formatMoney(summary.day_pnl) }}</div></div>
    </div>

    <div class="order-layout" style="display:grid;grid-template-columns:360px 1fr;gap:20px">
      <!-- 快速下单 -->
      <div class="card">
        <div class="card-header">⚡ 快速下单</div>
        <div class="form-group">
          <label>股票代码</label>
          <input v-model="order.ts_code" placeholder="如 600519.SH" list="stock-list">
          <datalist id="stock-list">
            <option value="600519.SH">贵州茅台</option>
            <option value="000858.SZ">五粮液</option>
            <option value="000001.SZ">平安银行</option>
            <option value="601318.SH">中国平安</option>
            <option value="600036.SH">招商银行</option>
            <option value="000333.SZ">美的集团</option>
          </datalist>
        </div>
        <div class="form-group">
          <label>买卖方向</label>
          <div class="toggle-group">
            <button :class="{active:order.direction==='BUY'}" @click="order.direction='BUY'">买入</button>
            <button :class="{active:order.direction==='SELL'}" @click="order.direction='SELL'">卖出</button>
          </div>
        </div>
        <div class="form-group">
          <label>订单类型</label>
          <div class="toggle-group">
            <button :class="{active:order.order_type==='LIMIT'}" @click="order.order_type='LIMIT'">限价单</button>
            <button :class="{active:order.order_type==='MARKET'}" @click="order.order_type='MARKET'">市价单</button>
            <button :class="{active:order.order_type==='STOP'}" @click="order.order_type='STOP'">STOP</button>
          </div>
        </div>
        <div class="form-group" v-if="order.order_type==='STOP'">
          <label>触发价格</label>
          <input v-model.number="order.trigger_price" type="number" step="0.01" placeholder="STOP单触发价">
        </div>
        <div class="form-group">
          <label>{{ order.order_type === 'MARKET' ? '参考价格' : '价格' }}</label>
          <input v-model.number="order.price" type="number" step="0.01" :disabled="order.order_type==='MARKET'&&false">
        </div>
        <div class="form-group">
          <label>数量（股，100的倍数）</label>
          <input v-model.number="order.quantity" type="number" step="100" min="100">
        </div>
        <button class="btn btn-primary" style="width:100%" @click="submitOrder" :disabled="submitting">
          {{ submitting ? '提交中...' : '提交订单' }}
        </button>
      </div>

      <!-- 持仓列表 -->
      <div class="card">
        <div class="card-header">
          📦 当前持仓
          <span style="font-size:12px;color:#999">{{ positions.length }} 只</span>
        </div>
        <div v-if="positions.length === 0" style="text-align:center;padding:40px;color:#999">暂无持仓</div>
        <table v-else class="data-table">
          <thead>
            <tr>
              <th>代码</th><th>持仓量</th><th>成本价</th><th>现价</th><th>市值</th><th>盈亏</th><th>盈亏率</th><th>操作</th>
            </tr>
          </thead>
          <tbody>
            <tr v-for="p in positions" :key="p.ts_code">
              <td><strong>{{ p.ts_code }}</strong></td>
              <td>{{ p.total_quantity }}</td>
              <td>{{ p.cost_price }}</td>
              <td :class="colorClass(p.profit_loss)">{{ p.current_price || '--' }}</td>
              <td>{{ formatMoney(p.market_value) }}</td>
              <td :class="colorClass(p.profit_loss)">{{ formatMoney(p.profit_loss) }}</td>
              <td :class="colorClass(p.profit_loss)">{{ formatPct(p.profit_loss_ratio) }}</td>
              <td class="pos-actions">
                <button class="btn btn-error btn-sm" @click="confirmClose(p)">平仓</button>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- 订单历史 -->
    <div class="card" style="margin-top:20px">
      <div class="card-header">
        📋 订单历史
        <select v-model="orderFilter" @change="loadOrders" style="padding:4px 10px;border:1px solid #ddd;border-radius:4px">
          <option value="">全部</option>
          <option value="PENDING">待处理</option>
          <option value="FILLED">已成交</option>
          <option value="CANCELLED">已撤销</option>
          <option value="REJECTED">已拒绝</option>
        </select>
      </div>
      <div v-if="errorMsg" class="error-state">
        <div class="icon">⚠️</div>
        <p>{{ errorMsg }}</p>
        <button class="btn btn-primary btn-sm" @click="loadAll">重新连接</button>
      </div>
      <table v-else class="data-table">
        <thead>
          <tr>
            <th>订单ID</th><th>股票</th><th>方向</th><th>类型</th><th>价格</th><th>数量</th><th>状态</th><th>时间</th><th>操作</th>
          </tr>
        </thead>
        <tbody>
          <tr v-for="o in orders" :key="o.order_id">
            <td style="font-family:monospace;font-size:11px">{{ o.order_id?.slice(-8) }}</td>
            <td>{{ o.ts_code }}</td>
            <td><span :class="o.direction==='BUY'?'badge badge-error':'badge badge-success'">{{ o.direction }}</span></td>
            <td>{{ o.order_type }}</td>
            <td>{{ o.price || '--' }}</td>
            <td>{{ o.quantity }}</td>
            <td>
              <span class="badge" :class="statusBadge(o.status)">{{ o.status }}</span>
            </td>
            <td style="font-size:12px">{{ timeAgo(o.created_at) }}</td>
            <td>
              <button v-if="o.status==='PENDING'" class="btn btn-warning btn-sm" @click="confirmCancel(o)">撤单</button>
            </td>
          </tr>
        </tbody>
      </table>
      <div v-if="orders.length === 0 && !errorMsg" style="text-align:center;padding:40px;color:#999">暂无订单记录</div>
    </div>
  </template>

  <!-- 确认弹窗 -->
  <div v-if="modal.visible" class="modal-overlay" role="alertdialog" aria-modal="true" aria-labelledby="modal-title" @click.self="modal.visible=false">
    <div class="modal-box">
      <h3>{{ modal.title }}</h3>
      <p>{{ modal.message }}</p>
      <div class="modal-actions">
        <button class="btn" style="background:#999" @click="modal.visible=false">取消</button>
        <button class="btn btn-error" @click="modal.onConfirm">{{ modal.confirmText }}</button>
      </div>
    </div>
  </div>
</main>
</div>

<script src="app.js"></script>
<script src="js/orders.js"></script>

</body>
</html>
