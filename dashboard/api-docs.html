<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QTS v2.0 — 统一 API 文档</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swagger-ui-dist@5/swagger-ui.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f7fa; }
        .topbar {
            background: #1a1a2e; color: #fff; padding: 0 24px; height: 56px;
            display: flex; align-items: center; justify-content: space-between;
            position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }
        .topbar h1 { font-size: 18px; font-weight: 600; }
        .topbar .subtitle { font-size: 13px; color: #8899aa; margin-left: 12px; }
        .service-tabs { display: flex; gap: 4px; }
        .tab {
            padding: 8px 20px; border: none; border-radius: 6px; cursor: pointer;
            font-size: 13px; font-weight: 500; transition: all 0.2s;
            background: rgba(255,255,255,0.1); color: #8899aa;
        }
        .tab:hover { background: rgba(255,255,255,0.2); color: #fff; }
        .tab.active { background: #4f8cff; color: #fff; }
        .tab.all-active { background: #22c55e; color: #fff; }
        .container { padding: 0; }
        #swagger-ui { max-width: 100%; }
        /* 状态指示器 */
        .status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
        .status-dot.online { background: #22c55e; }
        .status-dot.offline { background: #ef4444; }
        .status-dot.loading { background: #f59e0b; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
        /* 响应式 */
        @media (max-width: 768px) {
            .topbar { flex-direction: column; height: auto; padding: 12px 16px; gap: 8px; }
            .service-tabs { width: 100%; justify-content: center; flex-wrap: wrap; }
            .tab { padding: 6px 14px; font-size: 12px; }
        }
    </style>
</head>
<body>
    <div class="topbar">
        <div>
            <h1>
                <span class="status-dot" id="statusDot"></span>
                QTS v2.0 API 文档
                <span class="subtitle">strategy · execution · ai-scheduler</span>
            </h1>
        </div>
        <div class="service-tabs">
            <button class="tab" onclick="switchSpec(0)" id="tab0">📊 策略服务</button>
            <button class="tab" onclick="switchSpec(1)" id="tab1">📈 执行服务</button>
            <button class="tab" onclick="switchSpec(2)" id="tab2">🤖 AI调度器</button>
            <button class="tab" onclick="switchSpec('all')" id="tabAll">📋 全部</button>
        </div>
    </div>
    <div class="container">
        <div id="swagger-ui"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swagger-ui-dist@5/swagger-ui-bundle.js"></script>
    <script>
    const SERVICES = [
        { name: 'strategy-service', port: 8000, label: '策略研究服务', version: '2.0.0' },
        { name: 'execution-service', port: 8001, label: '交易执行服务', version: '1.1.0' },
        { name: 'ai-scheduler', port: 8002, label: 'AI 智能调度器', version: '1.0.0' },
    ];

    const API_BASE = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
        ? 'http://localhost'
        : '';

    let currentIndex = 0;
    let ui = null;

    const STATIC_SPECS = [
        'docs/api/strategy-service.json',
        'docs/api/execution-service.json',
        'docs/api/ai-scheduler.json',
    ];

    async function buildSpecs() {
        const specs = [];
        const statusDot = document.getElementById('statusDot');
        let onlineCount = 0;

        for (let i = 0; i < SERVICES.length; i++) {
            const svc = SERVICES[i];
            let spec = null;

            // 策略1: 从运行的微服务动态拉取
            try {
                const url = `${API_BASE}:${svc.port}/openapi.json`;
                const resp = await fetch(url, { signal: AbortSignal.timeout(3000) });
                if (resp.ok) {
                    spec = await resp.json();
                    onlineCount++;
                }
            } catch (e) { /* fallback */ }

            // 策略2: 离线回退到静态 spec 文件
            if (!spec) {
                try {
                    const resp = await fetch(`../${STATIC_SPECS[i]}`);
                    if (resp.ok) {
                        spec = await resp.json();
                    }
                } catch (e) { /* 双回退 */ }
            }

            if (spec) {
                spec.info.title = `[${svc.label}] ${spec.info.title}`;
                spec.info.description = `${spec.info.description || ''}\n\n**端口**: ${svc.port} | **版本**: ${spec.info.version}`;
                specs.push(spec);
            } else {
                // 完全离线时创建占位
                specs.push({
                    openapi: '3.0.0',
                    info: {
                        title: `[${svc.label}] ${svc.name}`,
                        description: `⚠️ 服务不可用（端口 ${svc.port}）\n\n请确保服务已启动：\`docker-compose up -d ${svc.name}\``,
                        version: svc.version
                    },
                    paths: {}
                });
            }
        }

        // 更新状态指示器
        if (onlineCount === 3) {
            statusDot.className = 'status-dot online';
            statusDot.title = '所有服务在线';
        } else if (onlineCount > 0) {
            statusDot.className = 'status-dot loading';
            statusDot.title = `${onlineCount}/3 服务在线`;
        } else {
            statusDot.className = 'status-dot offline';
            statusDot.title = '所有服务离线';
        }

        return specs;
    }

    function renderSwagger(specs, index) {
        const container = document.getElementById('swagger-ui');
        container.innerHTML = '';

        let urls;
        if (index === 'all') {
            urls = specs.map((s, i) => ({
                url: s.info.title,
                name: SERVICES[i].label
            }));
        } else {
            urls = [{ url: specs[index].info.title, name: SERVICES[index].label }];
        }

        // 使用多个 spec 的 Swagger UI 配置
        const config = index === 'all'
            ? {
                urls: specs.map((s, i) => ({
                    url: `${API_BASE}:${SERVICES[i].port}/openapi.json`,
                    name: SERVICES[i].label
                })),
                'urls.primaryName': SERVICES[0].label,
            }
            : { url: `${API_BASE}:${SERVICES[index].port}/openapi.json` };

        ui = SwaggerUIBundle({
            dom_id: '#swagger-ui',
            ...config,
            deepLinking: true,
            docExpansion: 'list',
            defaultModelsExpandDepth: 2,
            defaultModelExpandDepth: 2,
            filter: true,
            tryItOutEnabled: true,
            displayRequestDuration: true,
            syntaxHighlight: { activate: true, theme: 'monokai' },
            layout: 'BaseLayout',
            presets: [SwaggerUIBundle.presets.apis],
            plugins: [SwaggerUIBundle.plugins.DownloadUrl],
        });
    }

    async function switchSpec(index) {
        currentIndex = index;
        // 更新 tab 样式
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active', 'all-active'));
        const tabId = index === 'all' ? 'tabAll' : `tab${index}`;
        const tab = document.getElementById(tabId);
        tab.classList.add(index === 'all' ? 'all-active' : 'active');

        const specs = await buildSpecs();
        renderSwagger(specs, index);
    }

    // 初始化
    async function init() {
        const specs = await buildSpecs();
        renderSwagger(specs, 0);
        document.getElementById('tab0').classList.add('active');
    }

    init();
    </script>
</body>
</html>
