<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net 'unsafe-inline'; style-src 'self' https://cdn.jsdelivr.net 'unsafe-inline'; connect-src 'self' ws: wss: https://cdn.jsdelivr.net; img-src 'self' data: blob:; font-src 'self' data:;">
    <meta name="color-scheme" content="light dark">
    <title>QTS v2.0 — 统一 API 文档</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swagger-ui-dist@5/swagger-ui.css" integrity="sha384-9Q2fpS+xeS4ffJy6CagnwoUl+4ldAYhOs9pgZuEKxypVModhmZFzeMlvVsAjf7uT" crossorigin="anonymous">
    <style nonce="CSP_NONCE">
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f7fa; }
        .topbar {
            background: #1a1a2e; color: #fff; padding: 0 24px; height: 56px;
            display: flex; align-items: center; justify-content: space-between;
            position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }
        .topbar h1 { font-size: 18px; font-weight: 500; }
        .topbar .subtitle { font-size: 13px; color: #8899aa; margin-left: 12px; }
        .service-tabs { display: flex; gap: 4px; }
        .tab {
            padding: 8px 20px; border: none; border-radius: 6px; cursor: pointer;
            font-size: 13px; font-weight: 500; transition: all 0.2s;
            background: rgba(255,255,255,0.1); color: #8899aa;
        }
        .tab:hover { background: rgba(255,255,255,0.2); color: #fff; }
        .tab.active { background: #4f8cff; color: #fff; }
        .tab.all-active { background: #22c55e; color: #fff; }
        .container { padding: 0; }
        #swagger-ui { max-width: 100%; }
        /* 状态指示器 */
        .status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
        .status-dot.online { background: #22c55e; }
        .status-dot.offline { background: #ef4444; }
        .status-dot.loading { background: #f59e0b; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
        /* 响应式 */
        @media (max-width: 768px) {
            .topbar { flex-direction: column; height: auto; padding: 12px 16px; gap: 8px; }
            .service-tabs { width: 100%; justify-content: center; flex-wrap: wrap; }
            .tab { padding: 6px 14px; font-size: 12px; }
        }
    </style>
</head>
<body>
    <div class="topbar">
        <div>
            <h1>
                <span class="status-dot" id="statusDot"></span>
                QTS v2.0 API 文档
                <span class="subtitle">strategy · execution · ai-scheduler</span>
            </h1>
        </div>
        <div class="service-tabs">
            <button class="tab" id="tab0">📊 策略服务</button>
            <button class="tab" id="tab1">📈 执行服务</button>
            <button class="tab" id="tab2">🤖 AI调度器</button>
            <button class="tab" id="tabAll">📋 全部</button>
        </div>
    </div>
    <main class="container" role="main">
        <div id="swagger-ui"></div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/swagger-ui-dist@5/swagger-ui-bundle.js" integrity="sha384-EYdOaiRwn44zNjrw+Tfs06qYz9BGQVo2f4/pLY5i7VorbjnZNhdplAbTBk8FXHUJ" crossorigin="anonymous"></script>
    <script src="js/api-docs.js"></script>

</body>
</html>
