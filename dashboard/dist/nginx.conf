worker_processes 2;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format json_log escape=json '{'
        '"time":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"method":"$request_method",'
        '"uri":"$request_uri",'
        '"status":$status,'
        '"bytes":$body_bytes_sent,'
        '"request_id":"$http_x_request_id",'
        '"referer":"$http_referer",'
        '"user_agent":"$http_user_agent",'
        '"request_time":$request_time'
    '}';

    access_log /var/log/nginx/access.log json_log;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    gzip on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # Brotli compression（requires ngx_brotli module）
    brotli on;
    brotli_comp_level 6;
    brotli_types text/plain text/css application/json application/javascript image/svg+xml application/xml+rss;

    # Security headers (OWASP Top 10 2025)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    # CSP nonce: $request_id 作为每次请求唯一的随机 nonce
    # HTML 中 <style nonce="CSP_NONCE"> 占位符由 sub_filter 自动替换
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://cdn.jsdelivr.net; style-src 'self' 'nonce-$request_id'; img-src 'self' data:; connect-src 'self' ws: wss:; font-src 'self' https://cdn.jsdelivr.net; worker-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
    # HSTS — TLS 代理层（K8s ingress / 反向代理）配置后启用
    # 注：如果 nginx 监听的是 HTTP，HSTS 头不会生效。在 K8s ingress 或 ALB 层启用。
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    server_tokens off;

    # Upstream backends (Docker Compose 服务名)
    upstream strategy_backend {
        server quant-strategy:8000 max_fails=3 fail_timeout=10s;
        keepalive 32;
    }

    upstream execution_backend {
        server quant-execution:8001 max_fails=3 fail_timeout=10s;
        keepalive 32;
    }

    upstream scheduler_backend {
        server quant-ai-scheduler:8002 max_fails=3 fail_timeout=10s;
        keepalive 32;
    }

    server {
        listen 80;
        server_name _;

        # CSP nonce: 注入到 HTML 替换 <style nonce="CSP_NONCE"> 占位符
        sub_filter_once off;
        sub_filter 'CSP_NONCE' '$request_id';
        sub_filter_types text/html;

        root /usr/share/nginx/html;

        # Static assets (long cache)
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
            expires 7d;
            add_header Cache-Control "public, immutable";
        }

        # HTML pages (short cache, no-transform)
        location ~* \.html$ {
            expires 1m;
            add_header Cache-Control "public, must-revalidate";
            add_header Cache-Control "no-transform";
        }

        # --- API Proxies (path-based routing to microservices) ---

        # Execution Service (port 8001) — routes: orders, positions, risk
        location ~ ^/api/v1/(orders|positions|risk)(/|$) {
            proxy_pass http://execution_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
            proxy_set_header Connection "";
            proxy_read_timeout 30s;
        }

        # AI Scheduler (port 8002) — routes: scheduler, health-monitor
        location ~ ^/api/v1/(scheduler|health-monitor)(/|$) {
            proxy_pass http://scheduler_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
            proxy_set_header Connection "";
            proxy_read_timeout 30s;
        }

        # Strategy Service (port 8000) — 兜底：所有未匹配的 /api/ 请求
        location /api/ {
            proxy_pass http://strategy_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
            proxy_set_header Connection "";
            proxy_read_timeout 30s;
        }

        # Legacy /execution/ proxy (backward compat)
        location /execution/ {
            proxy_pass http://execution_backend/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Request-ID $request_id;
            proxy_set_header Connection "";
            proxy_read_timeout 30s;
        }

        # --- WebSocket Proxies ---

        # Strategy WebSocket
        location /ws/strategy {
            proxy_pass http://strategy_backend/ws/strategy;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400s;
        }

        # Execution WebSocket
        location /ws/execution {
            proxy_pass http://execution_backend/ws/execution;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400s;
        }

        # Scheduler WebSocket
        location /ws/scheduler {
            proxy_pass http://scheduler_backend/ws/scheduler;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400s;
        }

        # Legacy WS catch-all → strategy
        location /ws {
            proxy_pass http://strategy_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 86400s;
        }

        # Default - SPA fallback
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
