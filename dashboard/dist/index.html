/* ============================================================
   首页专属样式
   ============================================================ */
.market-ticker {
  background: linear-gradient(135deg, #1a1d27 0%, #242836 100%);
  padding: 14px 0;
  border-bottom: 0.5px solid var(--color-border);
}
.market-ticker-inner {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 var(--space-6);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: var(--space-2);
}
.market-ticker .ticker-status {
  display: flex;
  align-items: center;
  gap: var(--space-3);
  flex-shrink: 0;
}
.market-ticker .ticker-items {
  display: flex;
  flex-wrap: wrap;
  gap: var(--space-5);
  flex: 1;
  justify-content: center;
}
.ticker-item {
  display: flex;
  align-items: center;
  gap: var(--space-2);
  padding: 4px 0;
  min-width: 120px;
}
.ticker-item .idx-name { font-size: var(--text-xs); color: #8b949e; white-space: nowrap; }
.ticker-item .idx-price { font-size: var(--text-base); font-weight: var(--font-weight-medium); color: #e5e7eb; font-family: var(--font-mono); }
.ticker-item .idx-pct { font-size: var(--text-xs); font-weight: var(--font-weight-medium); font-family: var(--font-mono); padding: 1px 6px; border-radius: 4px; }
.ticker-item .idx-pct.bull { color: var(--color-bull); background: rgba(212,48,47,0.12); }
.ticker-item .idx-pct.bear { color: var(--color-bear); background: rgba(28,160,28,0.12); }
.hero-section { margin-bottom: var(--space-6); }
.welcome-bar { display: flex; align-items: center; justify-content: space-between; padding: var(--space-4) 0 var(--space-6); }
.welcome-bar h2 { font-size: var(--text-xl); font-weight: var(--font-weight-medium); color: var(--color-text-primary); }
.welcome-bar .date-display { font-size: var(--text-sm); color: var(--color-text-secondary); font-family: var(--font-mono); }
.metric-card-big {
  background: var(--color-bg-surface);
  border: 0.5px solid var(--color-border);
  border-radius: var(--radius-lg);
  padding: var(--space-5) var(--space-6);
  display: flex;
  align-items: flex-start;
  gap: var(--space-4);
  transition: border-color var(--transition-fast), transform var(--transition-fast);
}
.metric-card-big:hover { border-color: var(--color-brand-200); transform: translateY(-1px); }
.metric-icon { width: 44px; height: 44px; border-radius: var(--radius-md); display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
.metric-card-big .metric-body { flex: 1; }
.metric-card-big .metric-label { font-size: var(--text-xs); color: var(--color-text-secondary); margin-bottom: var(--space-1); }
.metric-card-big .metric-number { font-size: 1.75rem; font-weight: var(--font-weight-medium); color: var(--color-text-primary); font-family: var(--font-mono); line-height: 1.2; }
.metric-card-big .metric-subtitle { font-size: var(--text-xs); color: var(--color-text-tertiary); margin-top: 2px; }
.func-grid-v2 { display: grid; grid-template-columns: repeat(4, 1fr); gap: var(--space-3); }
.func-card-v2 {
  background: var(--color-bg-surface);
  border: 0.5px solid var(--color-border);
  border-radius: var(--radius-lg);
  padding: var(--space-6) var(--space-5);
  text-decoration: none;
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  transition: all var(--transition-fast);
  cursor: pointer;
}
.func-card-v2:hover { border-color: var(--color-brand-400); transform: translateY(-2px); box-shadow: var(--shadow-md); }
.func-card-v2 .fc-icon { width: 48px; height: 48px; border-radius: var(--radius-lg); display: flex; align-items: center; justify-content: center; font-size: 22px; margin-bottom: var(--space-3); }
.func-card-v2 .fc-title { font-size: var(--text-sm); font-weight: var(--font-weight-medium); color: var(--color-text-primary); margin-bottom: var(--space-1); }
.func-card-v2 .fc-desc { font-size: var(--text-xs); color: var(--color-text-secondary); line-height: 1.4; }
.conn-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; animation: conn-pulse 2s ease-in-out infinite; }
.conn-dot.connected { background: var(--color-success); box-shadow: 0 0 6px rgba(22,163,74,0.4); }
.conn-dot.disconnected { background: var(--color-error); box-shadow: 0 0 6px rgba(220,38,38,0.3); }
.conn-dot.connecting { background: var(--color-warning); }
@keyframes conn-pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
.conn-text { font-size: var(--text-xs); color: #8b949e; }
@media (max-width: 1024px) { .func-grid-v2 { grid-template-columns: repeat(2, 1fr); } .ticker-items { gap: var(--space-3); } }
@media (max-width: 768px) { .func-grid-v2 { grid-template-columns: repeat(2, 1fr); gap: var(--space-2); } .func-card-v2 { padding: var(--space-4); } .metric-card-big { padding: var(--space-4); } .market-ticker-inner { flex-direction: column; align-items: flex-start; } }
@media (max-width: 480px) { .func-grid-v2 { grid-template-columns: 1fr 1fr; } .metric-card-big .metric-number { font-size: 1.25rem; } }

/* ============================================================
   pages — 账户页面
   ============================================================ */
.page-account .account-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px; }
.page-account .account-summary-card { background: var(--color-bg-surface); border: 0.5px solid var(--color-border); border-radius: 12px; padding: 18px 20px; transition: all 0.2s; }
.page-account .account-summary-card:hover { border-color: #667eea; transform: translateY(-2px); }
.page-account .account-summary-card .label { font-size: 12px; color: var(--color-text-secondary); margin-bottom: 4px; }

.page-account .account-summary-card .sub { font-size: 11px; color: var(--color-text-tertiary); margin-top: 2px; }

/* ============================================================

.page-orders .direction-toggle button.active-sell { background: var(--color-bear); color: #fff; border-color: var(--color-bear); }
.page-orders .submit-btn { width: 100%; padding: 10px 0; border: none; border-radius: 8px; font-size: 15px; font-weight: 500; cursor: pointer; color: #fff; transition: all 0.2s; margin-top: 8px; }
.page-orders .submit-btn.buy { background: var(--color-bull); }
.page-orders .submit-btn.buy:hover { background: #c0392b; }
.page-orders .submit-btn.sell { background: var(--color-bear); }

.page-orders .order-type-toggle { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
.page-orders .order-type-toggle button { padding: 6px 14px; border: 0.5px solid var(--color-border); border-radius: 6px; font-size: 12px; cursor: pointer; transition: all 0.15s; background: var(--color-bg-surface); color: var(--color-text); }
.page-orders .order-type-toggle button.active { background: #667eea; color: #fff; border-color: #667eea; }
@media (max-width: 900px) { .page-orders .order-layout { grid-template-columns: 1fr; } }

/* ============================================================
   pages — 交易分析页面
   ============================================================ */
.page-trade-analysis .ta-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 20px; }
.page-trade-analysis .ta-stat-card { background: var(--color-bg-surface); border: 0.5px solid var(--color-border); border-radius: 12px; padding: 16px; text-align: center; transition: all 0.2s; }
.page-trade-analysis .ta-stat-card:hover { border-color: #667eea; transform: translateY(-1px); }
.page-trade-analysis .ta-stat-card .label { font-size: 12px; color: var(--color-text-secondary); margin-bottom: 4px; }
.page-trade-analysis .ta-stat-card .value { font-size: 20px; font-weight: 500; font-family: var(--font-mono); }
.page-trade-analysis .ta-chart-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
.page-trade-analysis .ta-chart-box { background: var(--color-bg-surface); border: 0.5px solid var(--color-border); border-radius: 12px; padding: 16px; }
.page-trade-analysis .ta-chart-box .chart-title { font-size: 14px; font-weight: 500; margin-bottom: 10px; }
.page-trade-analysis .ta-chart-box .chart-area { height: 300px; }
@media (max-width: 900px) { .page-trade-analysis .ta-grid { grid-template-columns: repeat(2, 1fr); } .page-trade-analysis .ta-chart-grid { grid-template-columns: 1fr; } }

/* ============================================================
   pages — 回测页面
   ============================================================ */
.page-backtest .backtest-config { background: var(--color-bg-surface); border-radius: 12px; padding: 20px; border: 0.5px solid var(--color-border); margin-bottom: 20px; }

.page-backtest .stock-chips { display: flex; flex-wrap: wrap; gap: 6px; }

.page-backtest .stock-chip:hover { border-color: #667eea; }
.page-backtest .stock-chip.active { background: #667eea; color: #fff; border-color: #667eea; }
.page-backtest .strategy-chips { display: flex; flex-wrap: wrap; gap: 6px; }
.page-backtest .strategy-chip { padding: 5px 14px; border: 0.5px solid var(--color-border); border-radius: 6px; font-size: 12px; cursor: pointer; transition: all 0.15s; background: var(--color-bg-surface); color: var(--color-text); }
.page-backtest .strategy-chip:hover { border-color: #667eea; }
.page-backtest .strategy-chip.active { background: #667eea; color: #fff; border-color: #667eea; }
.page-backtest .backtest-kpis { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 16px; }
.page-backtest .kpi-card { background: var(--color-bg-surface); border: 0.5px solid var(--color-border); border-radius: 10px; padding: 14px; text-align: center; transition: all 0.2s; }
.page-backtest .kpi-card:hover { border-color: #667eea; transform: translateY(-1px); }
.page-backtest .kpi-card .kpi-label { font-size: 11px; color: var(--color-text-secondary); margin-bottom: 2px; }
.page-backtest .kpi-card .kpi-value { font-size: 18px; font-weight: 500; font-family: var(--font-mono); }
.page-backtest .bt-chart-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
.page-backtest .bt-chart-box { background: var(--color-bg-surface); border: 0.5px solid var(--color-border); border-radius: 12px; padding: 16px; }
.page-backtest .bt-chart-box .chart-area { height: 320px; }
.page-backtest .bt-chart-box .bt-chart-title { font-size: 13px; font-weight: 500; margin-bottom: 8px; color: var(--color-text-secondary); }
.page-backtest .bt-full-chart { grid-column: 1 / -1; }

/* 多策略选择 */
.page-backtest .strategy-chips.strategy-multi .strategy-chip { border-radius: 14px; padding: 4px 12px; font-size: 12px; }
.page-backtest .strategy-chips.strategy-multi .strategy-chip.active { background: #667eea; color: #fff; border-color: #667eea; }

/* 策略切换标签 */
.page-backtest .bt-strategy-tabs { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; margin-bottom: 12px; }
.page-backtest .bt-strategy-tab { padding: 3px 12px; border: 1px solid var(--color-border); border-radius: 12px; font-size: 11px; cursor: pointer; transition: all 0.15s; background: var(--color-bg-surface); }
.page-backtest .bt-strategy-tab:hover { opacity: 0.8; }
.page-backtest .bt-strategy-tab.active { color: #fff; border-color: transparent; font-weight: 500; }

/* 多策略对比表 */
.page-backtest .bt-compare-card { margin-bottom: 20px; }

.page-backtest .bt-compare-table .compare-label { font-weight: 500; color: var(--color-text-secondary); }
.page-backtest .bt-compare-table .compare-best-val { font-weight: 600; position: relative; }
.page-backtest .bt-compare-table .compare-best-val::after { content: ''; position: absolute; bottom: 1px; left: 10%; right: 10%; height: 2px; background: #2ed573; border-radius: 1px; }
.page-backtest .compare-best-mark { color: #2ed573; font-weight: 600; }

@media (max-width: 900px) {
  .page-backtest .backtest-kpis { grid-template-columns: repeat(2, 1fr); }
  .page-backtest .bt-chart-grid { grid-template-columns: 1fr; }
  .page-backtest .bt-compare-table { font-size: 11px; }
  .page-backtest .bt-compare-table td, .page-backtest .bt-compare-table th { padding: 4px 6px; }
}

/* ============================================================
   pages — 策略管理页面
   ============================================================ */
.page-strategies .strategy-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 16px; margin-top: 16px; }
.page-strategies .strategy-card { background: var(--color-bg-surface); border-radius: 12px; padding: 20px; border: 0.5px solid var(--color-border); transition: all 0.2s; position: relative; }
.page-strategies .strategy-card:hover { box-shadow: 0 6px 20px rgba(0,0,0,0.06); border-color: #667eea; }

.page-strategies .strategy-card .card-actions { position: absolute; top: 12px; right: 12px; display: flex; gap: 4px; opacity: 0; transition: opacity 0.2s; }

.page-strategies .strategy-card .card-actions .btn-edit:hover { color: #667eea; border-color: #667eea; }

.page-strategies .strategy-card .metric { font-size: 12px; color: var(--color-text-secondary); }
.page-strategies .strategy-card .metric strong { color: var(--color-text); font-size: 16px; font-weight: 500; display: block; }
.page-strategies .strategy-card .meta { margin-top: 14px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.page-strategies .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 500; }
.page-strategies .badge-builtin { background: #f3e5f5; color: #7b1fa2; }
.page-strategies .badge-trend { background: #e3f2fd; color: #1565c0; }
.page-strategies .badge-mean_reversion { background: #fff3e0; color: #e65100; }
.page-strategies .badge-momentum { background: #e8f5e9; color: #2e7d32; }
.page-strategies .badge-breakout { background: #ffebee; color: #c62828; }
.page-strategies .toolbar { display: flex; gap: 8px; align-items: center; margin-bottom: 20px; flex-wrap: wrap; }
.page-strategies .toolbar select { padding: 6px 12px; border: 1px solid #ccc; border-radius: 4px; background: var(--color-bg-surface); color: var(--color-text); }
.page-strategies .compare-table { margin-top: 20px; }

.page-strategies .confirm-del-box { background: var(--color-bg-surface); border-radius: 14px; padding: 28px; max-width: 380px; width: 90%; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
.page-strategies .confirm-del-box h3 { margin: 0 0 12px; font-size: 17px; font-weight: 500; }

.page-strategies .form-group { margin-bottom: 14px; }
.page-strategies .form-group label { display: block; font-size: 13px; font-weight: 500; color: var(--color-text); margin-bottom: 5px; }

/* ============================================================
   pages — 选股页面
   ============================================================ */
.page-stock-selection .section { background: var(--color-bg-surface); border-radius: 12px; padding: 20px; margin-bottom: 24px; box-shadow: var(--shadow-sm); }

.page-stock-selection .stock-card:hover { border-color: #667eea; box-shadow: 0 4px 16px rgba(102,126,234,0.15); transform: translateY(-2px); }
.page-stock-selection .stock-card .name-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }

.page-stock-selection .badge-sell { background: var(--color-bear-bg); color: var(--color-bear); }
.page-stock-selection .score { font-size: 13px; color: var(--color-text-secondary); }
.page-stock-selection .loading { text-align: center; padding: 40px; color: var(--color-text-secondary); }

/* ============================================================
   pages — 复盘分析页面
   ============================================================ */
.page-review-analysis .container { max-width: 1200px; margin: 0 auto; padding: 24px; }
.page-review-analysis .section { background: var(--color-bg-surface); border-radius: 12px; padding: 24px; margin-bottom: 20px; box-shadow: var(--shadow-sm); border: 0.5px solid var(--color-border); }
.page-review-analysis .date-bar {
  display: flex; align-items: center; justify-content: space-between; gap: 16px;
  padding: 16px 24px; background: var(--color-bg-surface); border-radius: 12px;
  box-shadow: var(--shadow-sm); border: 0.5px solid var(--color-border); margin-bottom: 20px; flex-wrap: wrap;
}
.page-review-analysis .date-bar .title { font-size: 16px; font-weight: 500; color: var(--color-text); white-space: nowrap; }
.page-review-analysis .date-picker { display: flex; gap: 10px; align-items: center; }
.page-review-analysis .date-picker input { padding: 8px 14px; border: 1px solid var(--color-border); border-radius: 8px; font-size: 14px; background: var(--color-bg-surface); color: var(--color-text); cursor: pointer; transition: all 0.2s; }
.page-review-analysis .date-picker input:hover, .date-picker input:focus { border-color: #667eea; box-shadow: 0 0 0 3px rgba(102,126,234,0.12); outline: none; }
.page-review-analysis .btn-reload { padding: 8px 18px; background: linear-gradient(135deg, #667eea, #764ba2); color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 500; transition: all 0.2s; white-space: nowrap; }
.page-review-analysis .btn-reload:hover { transform: translateY(-1px); box-shadow: 0 4px 14px rgba(102,126,234,0.3); }
.page-review-analysis .summary-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
.page-review-analysis .summary-card { background: linear-gradient(135deg, #f8f9ff 0%, #f0f2fa 100%); border-radius: 12px; padding: 18px 16px; text-align: center; border: 0.5px solid var(--color-border); transition: all 0.2s; cursor: default; }
.page-review-analysis .summary-card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.06); border-color: #667eea; }
.page-review-analysis .summary-card .label { font-size: 12px; color: var(--color-text-secondary); margin-bottom: 4px; }
.page-review-analysis .summary-card .value { font-size: 24px; font-weight: 500; margin-bottom: 2px; }
.page-review-analysis .tab-bar { display: flex; gap: 0; border-bottom: 2px solid var(--color-border); margin-bottom: 0; }
.page-review-analysis .tab-btn { padding: 10px 20px; border: none; background: none; cursor: pointer; font-size: 14px; font-weight: 500; color: var(--color-text-secondary); border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all 0.2s; }
.page-review-analysis .tab-btn:hover { color: #667eea; }
.page-review-analysis .tab-btn.active { color: #667eea; border-bottom-color: #667eea; }
.page-review-analysis .analysis-columns { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
.page-review-analysis .analysis-panel { background: var(--color-bg-surface); border-radius: 12px; padding: 20px; border: 0.5px solid var(--color-border); box-shadow: var(--shadow-sm); max-height: 520px; overflow-y: auto; }
.page-review-analysis .analysis-panel::-webkit-scrollbar { width: 5px; }
.page-review-analysis .analysis-panel::-webkit-scrollbar-thumb { background: var(--color-border); border-radius: 3px; }
.page-review-analysis .panel-title { font-size: 15px; font-weight: 500; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid rgba(102,126,234,0.12); display: flex; align-items: center; gap: 8px; }
.page-review-analysis .review-content { line-height: 1.6; font-size: 14px; }
.page-review-analysis .review-content h2 { font-size: 16px; font-weight: 500; color: #667eea; margin: 14px 0 8px; padding-bottom: 5px; border-bottom: 1px solid rgba(102,126,234,0.12); }
.page-review-analysis .review-content h2:first-child { margin-top: 0; }
.page-review-analysis .review-content strong { color: var(--color-bull); font-weight: 500; }
.page-review-analysis .review-content .review-item { padding: 3px 0 3px 20px; position: relative; line-height: 1.55; }
.page-review-analysis .review-content .review-item .num { position: absolute; left: 0; color: #667eea; font-weight: 500; }
.page-review-analysis .risk-badge { display: inline-block; padding: 1px 6px; border-radius: 3px; font-size: 11px; font-weight: 500; margin-right: 6px; }
.page-review-analysis .risk-badge.warn { background: #fff3e0; color: #e6a23c; }
.page-review-analysis .risk-badge.stop { background: #ffebee; color: var(--color-bull); }
.page-review-analysis .risk-badge.market { background: #f3e5f5; color: #7b1fa2; }
.page-review-analysis .risk-badge.suggest { background: #e8f5e9; color: #2e7d32; }
.page-review-analysis .chart-box { height: 320px; }
@media (max-width: 900px) { .page-review-analysis .analysis-columns { grid-template-columns: 1fr; } .page-review-analysis .analysis-panel { max-height: 400px; } }
@media (max-width: 768px) { .page-review-analysis .summary-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; } }
@media (max-width: 480px) { .page-review-analysis .summary-grid { grid-template-columns: 1fr; } .page-review-analysis .date-bar { flex-direction: column; align-items: flex-start; } }

/* ============================================================
   pages — 告警管理页面
   ============================================================ */
.page-alerts .main { max-width: 1200px; margin: 20px auto; padding: 0 20px; }
.page-alerts .card { background: var(--color-bg-surface); border-radius: 12px; padding: 24px; border: 0.5px solid var(--color-border); margin-bottom: 20px; }
.page-alerts .card-title { font-size: 16px; font-weight: 500; margin-bottom: 16px; display: flex; align-items: center; justify-content: space-between; }
.page-alerts .config-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 16px; }
.page-alerts .config-card { background: var(--color-bg-surface); border-radius: 12px; padding: 20px; border: 0.5px solid var(--color-border); display: flex; align-items: center; gap: 16px; transition: all 0.2s; }
.page-alerts .config-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.06); }
.page-alerts .config-card .icon { font-size: 28px; flex-shrink: 0; }
.page-alerts .config-card .info { flex: 1; }
.page-alerts .config-card .info h4 { font-size: 15px; margin-bottom: 4px; }
.page-alerts .config-card .info p { font-size: 12px; color: #888; line-height: 1.5; }
.page-alerts .toggle { position: relative; width: 44px; height: 24px; flex-shrink: 0; }
.page-alerts .toggle input { opacity: 0; width: 0; height: 0; }
.page-alerts .toggle .slider { position: absolute; inset: 0; background: #ddd; border-radius: 24px; cursor: pointer; transition: 0.3s; }
.page-alerts .toggle .slider::before { content: ''; position: absolute; height: 18px; width: 18px; left: 3px; bottom: 3px; background: #fff; border-radius: 50%; transition: 0.3s; }
.page-alerts .toggle input:checked + .slider { background: #409eff; }
.page-alerts .toggle input:checked + .slider::before { transform: translateX(20px); }
.page-alerts .health-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 16px; }
.page-alerts .health-card { background: var(--color-bg-surface); border-radius: 12px; padding: 20px; border: 0.5px solid var(--color-border); }
.page-alerts .health-card .service-name { font-size: 14px; font-weight: 500; margin-bottom: 8px; }
.page-alerts .health-card .status-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.page-alerts .health-card .dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; }
.page-alerts .dot-green { background: #2ed573; }
.page-alerts .dot-red { background: #ff4757; }
.page-alerts .dot-gray { background: #ccc; }
.page-alerts .health-card .status-text { font-size: 13px; }
.page-alerts .health-card .last-check { font-size: 11px; color: var(--color-text-secondary); }
.page-alerts .badge { display: inline-block; padding: 3px 10px; border-radius: 12px; font-size: 11px; font-weight: 500; }
.page-alerts .badge-info { background: #e3f2fd; color: #1565c0; }
.page-alerts .badge-warning { background: #fff3e0; color: #f57c00; }
.page-alerts .badge-critical { background: #fbe9e7; color: #d32f2f; }
.page-alerts .filter-row { display: flex; gap: 12px; align-items: center; }
.page-alerts .filter-row select { padding: 6px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 13px; outline: none; background: var(--color-bg-surface); color: var(--color-text); }
.page-alerts .btn { padding: 10px 20px; border: none; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.2s; }
.page-alerts .btn-primary { background: #409eff; color: #fff; }
.page-alerts .btn-primary:hover { background: #3a8ee6; }
.page-alerts .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
.page-alerts .refresh-btn { padding: 6px 14px; border: 1px solid #ddd; border-radius: 6px; font-size: 13px; cursor: pointer; background: var(--color-bg-surface); transition: all 0.2s; }
.page-alerts .refresh-btn:hover { border-color: #409eff; color: #409eff; }
.page-alerts .toast { position: fixed; top: 20px; right: 20px; z-index: 9999; padding: 14px 22px; border-radius: 8px; font-size: 14px; color: #fff; box-shadow: 0 4px 16px rgba(0,0,0,0.15); transition: all 0.3s; opacity: 0; transform: translateY(-10px); }
.page-alerts .toast.show { opacity: 1; transform: translateY(0); }
.page-alerts .toast.success { background: var(--color-bear); }
.page-alerts .toast.error { background: var(--color-bull); }
.page-alerts .toast.info { background: #409eff; }
.page-alerts .table-wrap { overflow-x: auto; }
.page-alerts table { width: 100%; border-collapse: collapse; font-size: 13px; }
.page-alerts th { background: var(--color-bg-hover); padding: 10px 12px; text-align: left; font-weight: 500; color: var(--color-text-secondary); border-bottom: 1px solid var(--color-border); white-space: nowrap; }
.page-alerts td { padding: 10px 12px; border-bottom: 1px solid var(--color-border); white-space: nowrap; }
.page-alerts tr:hover { background: var(--color-bg-hover); }
.page-alerts .note { font-size: 12px; color: var(--color-text-secondary); margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--color-border); }
@media (max-width: 768px) { .page-alerts .config-grid { grid-template-columns: 1fr; } .page-alerts .health-grid { grid-template-columns: 1fr; } }
