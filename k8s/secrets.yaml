apiVersion: v1
kind: Secret
metadata:
  name: quant-secrets
  namespace: quant-trading
type: Opaque
stringData:
  # Database
  POSTGRES_USER: "quant_user"
  POSTGRES_PASSWORD: "quant_pass"
  POSTGRES_DB: "quant_trading"
  DATABASE_URL: "postgresql://quant_user:quant_pass@postgres.quant-trading.svc.cluster.local:5432/quant_trading"

  # Redis
  REDIS_URL: "redis://redis.quant-trading.svc.cluster.local:6379/0"

  # QuestDB
  QUESTDB_URL: "http://questdb.quant-trading.svc.cluster.local:8812"

  # RabbitMQ
  RABBITMQ_DEFAULT_USER: "quant_user"
  RABBITMQ_DEFAULT_PASS: "quant_pass"
  RABBITMQ_URL: "amqp://quant_user:quant_pass@rabbitmq.quant-trading.svc.cluster.local:5672"

  # External APIs (override with actual values)
  TUSHARE_TOKEN: ""
  AKSHARE_TOKEN: ""
  DEEPSEEK_API_KEY: ""
  KIMI_API_KEY: ""
  GLM_API_KEY: ""
  MINIMAX_API_KEY: ""

  # MiniQMT (trading gateway)
  MINIQMT_USER: ""
  MINIQMT_PASSWORD: ""

  # Feishu Alert
  FEISHU_WEBHOOK: ""

  # Grafana
  GF_SECURITY_ADMIN_PASSWORD: "admin"
