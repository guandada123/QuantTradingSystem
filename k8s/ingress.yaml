---
# Ingress for external access
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: quant-trading-ingress
  namespace: quant-trading
  labels:
    app.kubernetes.io/part-of: quant-trading-system
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    # WebSocket support
    nginx.ingress.kubernetes.io/websocket-services: "dashboard"
    # 链路追踪：透传 X-Request-ID 至后端服务
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header X-Request-ID $request_id;
    # SSL redirect (enable in production)
    # nginx.ingress.kubernetes.io/ssl-redirect: "true"
    # nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
spec:
  ingressClassName: nginx
  rules:
    - host: quant.local
      http:
        paths:
          # Dashboard (main UI)
          - path: /()(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: dashboard
                port:
                  number: 80
          # Strategy Service API
          - path: /api(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: strategy-service
                port:
                  number: 8000
          # Execution Service API
          - path: /execution(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: execution-service
                port:
                  number: 8001
          # AI Scheduler API
          - path: /scheduler(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: ai-scheduler
                port:
                  number: 8002
          # Grafana
          - path: /grafana(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: grafana
                port:
                  number: 3000
          # Kibana
          - path: /kibana(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: kibana
                port:
                  number: 5601
          # Prometheus (internal monitoring, restrict in production)
          - path: /prometheus(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: prometheus
                port:
                  number: 9090
          # RabbitMQ Management
          - path: /rabbitmq(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: rabbitmq
                port:
                  number: 15672
