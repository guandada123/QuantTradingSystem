---
# PodDisruptionBudget for strategy-service (min 1 available during voluntary disruptions)
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: strategy-service-pdb
  namespace: quant-trading
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: strategy-service
---
# PodDisruptionBudget for execution-service
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: execution-service-pdb
  namespace: quant-trading
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: execution-service
---
# PodDisruptionBudget for ai-scheduler
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: ai-scheduler-pdb
  namespace: quant-trading
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: ai-scheduler
---
# PodDisruptionBudget for dashboard
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: dashboard-pdb
  namespace: quant-trading
spec:
  minAvailable: 1
  selector:
    matchLabels:
