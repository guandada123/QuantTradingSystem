---
# PodDisruptionBudget for postgres (StatefulSet, max 1 unavailable)
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: postgres-pdb
  namespace: quant-trading
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app: postgres
---
# PodDisruptionBudget for prometheus
apiVersion: policy/v1
kind: PodDisruptionBudget
